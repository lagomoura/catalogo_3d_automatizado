<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // Aura3D — fija el tema antes del primer paint (evita el flash).
      (function () {
        try {
          var t = localStorage.getItem("aura-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <title>Aura3D · Gestión para tu taller 3D</title>
    <link rel="icon" type="image/svg+xml" href="/aura-mark.svg" />
    <meta name="theme-color" content="#12b5a5" />

    <!-- SEO + social. El apex (/) sirve la landing de marketing: la descripción
         y el OG apuntan a ella. (Para una preview rica conviene reemplazar
         og:image por un PNG/JPG 1200×630 — los SVG no renderizan en WhatsApp.) -->
    <meta
      name="description"
      content="Aura3D convierte tu impresión 3D en una tienda: pegás un link de MakerWorld y obtenés catálogo con imágenes de tu marca, visor 3D y precios calculados. Vitrina online + back-office + asistente IA, en un solo lugar. Sin tarjeta."
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aura3D" />
    <meta property="og:url" content="https://aura3d.com/" />
    <meta property="og:title" content="Aura3D · Tu impresión 3D, convertida en tienda" />
    <meta
      property="og:description"
      content="Del link de MakerWorld a tu vitrina en minutos: catálogo con la identidad de tu marca, visor 3D, precios calculados y back-office con asistente IA."
    />
    <meta property="og:image" content="https://aura3d.com/aura-mark.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aura3D · Tu impresión 3D, convertida en tienda" />
    <meta
      name="twitter:description"
      content="Del link de MakerWorld a tu vitrina en minutos: catálogo, visor 3D y precios, con la identidad de tu marca."
    />
    <meta name="twitter:image" content="https://aura3d.com/aura-mark.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <!-- model-viewer se carga BAJO DEMANDA (ver components/Model3DLightbox)
         para no penalizar el LCP de la vitrina pública, donde la mayoría de
         los visitantes nunca abre un modelo 3D. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
