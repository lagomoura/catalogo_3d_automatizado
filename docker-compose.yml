# Postgres local para desarrollo. El backend se sigue corriendo con uvicorn
# fuera de Docker; este compose solo levanta la base de datos.
services:
  db:
    image: postgres:16-alpine
    container_name: catalog_db
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
